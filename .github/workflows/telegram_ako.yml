name: 🚀 WYSYŁKA KUPONU AKO (Telegram)

# To polecenie tworzy ręczny przycisk "Run workflow" w zakładce Actions
on: 
  workflow_dispatch:

jobs:
  wyslij_telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Pobranie kodu repozytorium
        uses: actions/checkout@v3

      - name: Instalacja środowiska Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalacja wymaganych bibliotek
        run: |
          pip install requests gspread oauth2client

      - name: Przygotowanie klucza Google API (credentials.json)
        env:
          # Pobiera sekretny klucz Google (zakładam, że masz go w Secrets jako GOOGLE_CREDENTIALS)
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "$GOOGLE_CREDENTIALS" > credentials.json

      - name: Uruchomienie skryptu wysyłającego
        run: python wyslij_kupon.py
