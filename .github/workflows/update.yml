name: Update BetExplorer & Sofascore

on:
  schedule:
    - cron: '0 5 * * *'  # Automatyczny start codziennie o 5:00 rano
  workflow_dispatch:     # Pozwala na ręczne odpalenie guzikiem "Run workflow"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run BetExplorer Scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python betexplorer_all.py

      - name: Run Sofascore Scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python sofascore_scraper.py
